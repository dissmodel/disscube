name: CI

on:
  push:
    branches: ["main", "evolution"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev,bdc]"

      - name: Run tests
        run: pytest -q
